<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>奇幻職業心理測驗</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
    }
    .card {
      position: relative;
      width: min(760px, 92vw);
      padding: 28px;
      text-align: center;
    }
    h1 {
      margin: 0 0 28px;
      font-size: clamp(1.4rem, 5vw, 2.4rem);
      font-weight: 700;
      text-align: center;
      line-height: 1.3;
    }
    .subtitle { font-size: clamp(0.95rem, 3.5vw, 1.15rem); opacity: .9; line-height: 1.9; margin-bottom: 36px; text-align: center; }
    .scene-title {
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 700;
      text-align: center;
      margin: 0 0 16px;
    }
    .question-img {
      width: 100%;
      height: 220px;
      background: #d0d0d0;
      border-radius: 12px;
      margin-bottom: 24px;
      object-fit: cover;
      display: block;
    }
    .question-text {
      font-size: 1.1rem;
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.7;
    }
    .choices { display: grid; gap: 14px; }
    button {
      all: unset;
      cursor: pointer;
      border-radius: 14px;
      transition: opacity .15s ease, transform .1s ease;
      line-height: 1.5;
    }
    .choice-btn {
      background: #fff;
      color: #000;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 18px 20px;
      border-radius: 14px;
      text-align: center;
      display: block;
      width: 100%;
      box-sizing: border-box;
    }
    .choice-btn:hover {
      opacity: .85;
      transform: translateY(-2px);
    }
    #start-btn {
      background: #fff;
      color: #000;
      font-size: clamp(1rem, 4vw, 1.2rem);
      font-weight: 600;
      padding: 18px clamp(32px, 10vw, 80px);
      border-radius: 50px;
      border: none;
      letter-spacing: .05em;
      width: min(320px, 80vw);
    }
    #start-btn:hover {
      background: #e8e8e8;
      transform: translateY(-2px);
    }
    .result-done {
      font-size: 1rem;
      opacity: .6;
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .result-role {
      font-size: clamp(1.8rem, 7vw, 3rem);
      font-weight: 700;
      color: #ffd76a;
      text-shadow: 0 0 24px rgba(255, 215, 0, .6);
      margin: 0 0 28px;
      line-height: 1.2;
    }
    .result-traits {
      font-size: 1rem;
      opacity: .75;
      margin-bottom: 28px;
      letter-spacing: .05em;
    }
    .result-divider {
      width: 60px;
      height: 2px;
      background: rgba(255,215,0,.4);
      margin: 0 auto 28px;
      border-radius: 2px;
    }
    .result-desc {
      font-size: 1.05rem;
      line-height: 1.9;
      opacity: .88;
      max-width: 520px;
      margin: 0 auto 40px;
    }
    .name-input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255,255,255,.15);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 1.1rem;
      font-family: inherit;
      padding: 18px 20px;
      text-align: center;
      margin-bottom: 28px;
      outline: none;
    }
    .name-input::placeholder { color: rgba(255,255,255,.5); }
    .name-input:focus { background: rgba(255,255,255,.22); }
    .mute-btn {
      position: fixed;
      top: 16px;
      right: 20px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
      font-size: 1.2rem;
      padding: 8px 12px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 999;
      backdrop-filter: blur(6px);
      transition: background .2s;
    }
    .mute-btn:hover { background: rgba(255,255,255,.22); }
  </style>
</head>
<body>
  <audio id="bgm" src="source/Hateno_Village.mp3" loop></audio>
  <button class="mute-btn" id="mute-btn" style="display:none" title="音樂開關">🔊</button>
  <main class="card">
    <h1>RPG冒險：你的人格職業是什麼？</h1>
    <p class="subtitle" id="intro">
      歡迎轉生到奇幻世界！這裡的一切未知而神秘。<br>
      今天，你將經歷一場冒險，探索自己內在的潛力。<br>
      每個選擇都將決定你在這場冒險中的職業角色。<br>
      準備好踏上冒險了嗎？
    </p>

    <section id="quiz"></section>
    <div class="footer">※ 測驗僅供婚禮互動娛樂使用</div>
  </main>

  <script>
    const data = {
      q1: {
        scene: "冒險起點",
        img: "source/start.png",
        question: "你剛從平行世界轉生，睜開眼睛，眼前的世界是？",
        choices: [
          { text: "翠綠森林，鳥語花香", next: "q2" },
          { text: "灰暗廢墟，陰風颼颼", next: "q3" },
          { text: "空白虛無，什麼都沒有", next: "q4" }
        ]
      },
      q2: {
        scene: "森林探險",
        img: "source/森林探險.png",
        question: "你在森林中漫步，發現一棵會發光的古樹，你會？",
        choices: [
          { text: "仔細研究樹的魔法", next: "q5" },
          { text: "攀上樹，探索周圍", next: "q6" },
          { text: "守護樹，防止樹木受傷", next: "q7" }
        ]
      },
      q3: {
        scene: "廢墟迷宮",
        img: "source/廢墟迷宮.png",
        question: "廢墟中，你看到一個寶箱被怪物守護，你會？",
        choices: [
          { text: "衝上去戰鬥", next: "q6" },
          { text: "小心解鎖陷阱", next: "q5" },
          { text: "設置防禦，先確保安全", next: "q7" }
        ]
      },
      q4: {
        scene: "虛空探索",
        img: "source/虛空探索.png",
        question: "虛空中，你感覺到奇怪的能量，你想做什麼？",
        choices: [
          { text: "建造工具，穩住環境", next: "q8" },
          { text: "冥想，觀察周圍", next: "q7" },
          { text: "勇敢探索未知", next: "q6" }
        ]
      },
      q5: {
        scene: "魔法的抉擇",
        img: "source/魔法的抉擇.png",
        question: "發現一顆神秘水晶，你會？",
        choices: [
          { text: "研究魔法，探索神秘力量", next: "q9" },
          { text: "製作小工具或武器", next: "q8" },
          { text: "召喚守護靈", next: "q10" }
        ]
      },
      q6: {
        scene: "勇氣挑戰",
        img: "source/勇氣挑戰.png",
        question: "面對懸崖與危險怪物，你會？",
        choices: [
          { text: "衝上去冒險", next: "q9" },
          { text: "慎重探索", next: "q10" },
          { text: "搭建橋或防禦", next: "q11" }
        ]
      },
      q7: {
        scene: "團隊抉擇",
        img: "source/團隊抉擇.png",
        question: "遇到一群迷路旅人，你會？",
        choices: [
          { text: "幫助他們安全穿越", next: "q10" },
          { text: "帶領大家冒險", next: "q9" },
          { text: "建造工具或防護", next: "q11" }
        ]
      },
      q8: {
        scene: "創造與建設",
        img: "source/創造與建設.png",
        question: "看到一片空地，你會做什麼？",
        choices: [
          { text: "建造小屋或工具", next: "q11" },
          { text: "研究地形和魔法", next: "q12" },
          { text: "探索未知", next: "q9" }
        ]
      },
      q9: {
        scene: "冒險決策",
        img: "source/冒險決策.png",
        question: "你遇到一個需要勇氣和策略才能通過的陷阱，你會？",
        choices: [
          { text: "直接衝上去", result: "勇者" },
          { text: "使用智慧解決", result: "魔法師" },
          { text: "幫助團隊安全通過", result: "戰士" }
        ]
      },
      q10: {
        scene: "支援選擇",
        img: "source/支援選擇.png",
        question: "隊伍遇到危險時，你會？",
        choices: [
          { text: "治療或協助隊伍", result: "牧師" },
          { text: "提供策略與魔法", result: "魔法師" },
          { text: "保護隊伍承受傷害", result: "戰士" }
        ]
      },
      q11: {
        scene: "守護與挑戰",
        img: "source/守護與挑戰.png",
        question: "站在隊伍前方，敵人逼近，你會？",
        choices: [
          { text: "衝在最前線", result: "勇者" },
          { text: "建立防護或屏障", result: "戰士" },
          { text: "鼓舞或協助隊伍", result: "牧師" }
        ]
      },
      q12: {
        scene: "終極選擇",
        img: "source/終極選擇.png",
        question: "抵達一個未知城鎮，你想如何行動？",
        choices: [
          { text: "接受挑戰，成為英雄", result: "勇者" },
          { text: "協助居民與隊伍", result: "牧師" },
          { text: "研究城鎮秘密", result: "魔法師" }
        ]
      }
    };

    const roleData = {
      "勇者": {
        traits: "行動力強、勇於冒險、敢於挑戰",
        desc: "你是團隊的開路先鋒！凡事不怕困難，喜歡衝在最前面解決問題。面對挑戰時，你總能第一時間做決定，帶領隊友踏上未知冒險。就算跌倒，也會笑著爬起來，繼續向前！"
      },
      "魔法師": {
        traits: "智慧型、策略型、好奇心強",
        desc: "你是團隊的智囊，喜歡分析與解謎。無論多麼複雜的挑戰，你總能找到最巧妙的方法解決。你的好奇心與學習力讓你在冒險中總能發現秘密寶藏或隱藏技能，成為不可或缺的智慧支援。"
      },
      "戰士": {
        traits: "穩定、可靠、耐心、守護型",
        desc: "你是團隊的防線與靠山，遇到危險總能穩住陣腳。無論風險多大，你總能冷靜應對，承擔重任，保護隊友安全。你的耐心與堅持讓隊伍能順利度過任何困境，是最值得信賴的伙伴。"
      },
      "牧師": {
        traits: "體貼、協助他人、團隊導向",
        desc: "你是團隊的心靈支柱，總能注意到隊友的需要，適時給予幫助與鼓勵。你溫暖、善解人意，能讓周圍的人感到安心。在冒險中，你不求最光彩的榮耀，只希望每個人都平安順利地完成任務。"
      }
    };

    const quizEl = document.getElementById("quiz");
    const introEl = document.getElementById("intro");

    function renderQuestion(id) {
      introEl.style.display = "none";
      document.querySelector("h1").style.display = "none";
      const q = data[id];
      quizEl.innerHTML = `
        <div class="scene-title">${q.scene}</div>
        ${q.img ? `<img class="question-img" src="${q.img}" alt="${q.scene}">` : `<div class="question-img"></div>`}
        <div class="question-text">${q.question}</div>
        <div class="choices">
          ${q.choices.map((c, i) => `<button class="choice-btn" data-index="${i}">${c.text}</button>`).join("")}
        </div>
      `;
      quizEl.querySelectorAll(".choice-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const choice = q.choices[Number(btn.dataset.index)];
          if (choice.result) renderResult(choice.result);
          else renderQuestion(choice.next);
        });
      });
    }

    function renderResult(role) {
      document.getElementById("intro").style.display = "none";
      document.querySelector("h1").style.display = "none";
      const r = roleData[role] ?? {};

      // 傳送到 Google Sheets
      fetch("https://script.google.com/macros/s/AKfycbxDF0ORUl_-oeDGZQvzFtBiFwBCff0fGG9zdRhiRag989aGnSkYvkYKlrhSyU_I_VD1/exec", {
        method: "POST",
        body: JSON.stringify({ name: window._playerName ?? "", role: role }),
      }).catch(() => {});  // 靜默失敗，不影響用戶體驗
      quizEl.innerHTML = `
        <div style="text-align:center; padding: 20px 0;">
          <div class="result-done">— 測驗完成 —</div>
          <div class="result-role">你的職業類型是<br>${role}</div>
          <div class="result-traits">人格特質：${r.traits ?? ""}</div>
          <div class="result-divider"></div>
          <div class="result-desc">${r.desc ?? ""}</div>
        </div>
      `;
      document.getElementById("restart").addEventListener("click", () => renderStart());
    }

    const bgm = document.getElementById("bgm");
    const muteBtn = document.getElementById("mute-btn");
    muteBtn.addEventListener("click", () => {
      bgm.muted = !bgm.muted;
      muteBtn.textContent = bgm.muted ? "🔇" : "🔊";
    });

    function startBgm() {
      bgm.play();
      muteBtn.style.display = "";
    }

    function renderStart() {
      introEl.style.display = "";
      document.querySelector("h1").style.display = "";
      quizEl.innerHTML = `<div style="text-align:center"><button id="start-btn">開始冒險</button></div>`;
      document.getElementById("start-btn").addEventListener("click", () => {
        startBgm();
        renderNameInput();
      });
    }

    function renderNameInput() {
      introEl.style.display = "none";
      document.querySelector("h1").style.display = "none";
      quizEl.innerHTML = `
        <div style="text-align:center; padding: 10px 0;">
          <div class="scene-title" style="margin-bottom:32px;">冒險者登入</div>
          <p style="font-size:1rem; opacity:.8; line-height:1.9; margin-bottom:36px;">
            在冒險開始前，請創建你的角色資料。<br>這將記錄你的冒險軌跡。
          </p>
          <input class="name-input" id="player-name" type="text" placeholder="請輸入你的本名" maxlength="20">
          <div style="text-align:center">
            <button id="enter-btn" style="background:#fff;color:#000;font-size:1.1rem;font-weight:600;padding:16px 60px;border-radius:50px;cursor:pointer;letter-spacing:.05em;">進入世界</button>
          </div>
        </div>
      `;
      const input = document.getElementById("player-name");
      const enterBtn = document.getElementById("enter-btn");
      function proceed() {
        const name = input.value.trim();
        if (!name) { input.focus(); return; }
        window._playerName = name;
        renderQuestion("q1");
      }
      enterBtn.addEventListener("click", proceed);
      input.addEventListener("keydown", e => { if (e.key === "Enter") proceed(); });
    }

    renderStart();
  </script>
</body>
</html>
